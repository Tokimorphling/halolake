version = 1

[server]
# host network / docker: bind all interfaces
listen = "0.0.0.0:9090"

[internal]
# Leave empty to auto-generate on first boot (written to /data/halolake-credentials.txt).
# For a split gateway process, set HALOLAKE_INTERNAL_SECRET (or copy internal_secret from the file).
secret = ""
gateway_base_url = "http://127.0.0.1:8082"

[session]
# Leave empty to auto-generate SESSION_SECRET on first boot.
secret = ""

[system]
name = "Halolake"

[web]
enabled = true
# Embedded default theme only (classic not built into the image).
default_dist = "/app/web/default"
theme = "default"

[storage]
backend = "sqlite"
sqlite_url = "sqlite:///data/halolake-control.db?mode=rwc"

# No [[users]] seed: first boot creates a strong admin password in
# /data/halolake-credentials.txt (see HALOLAKE_CREDENTIALS_FILE).
