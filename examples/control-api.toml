version = 1

[server]
listen = "127.0.0.1:9090"

[internal]
secret = "dev-internal-secret"

[system]
name = "Halolake"
# Disabled by default so local development does not hit real upstreams on a timer.
# task_scheduler_enabled = true
# channel_test_interval_seconds = 600
# model_update_interval_seconds = 1800

[web]
# Build with:
#   cd web/new-api && bun install && (cd default && bun run build)
enabled = true
default_dist = "web/new-api/default/dist"
classic_dist = "web/new-api/classic/dist"
theme = "default"

# Defaults to in-memory storage. For durable local control-plane state:
#
# [storage]
# backend = "sqlite"
# sqlite_url = "sqlite://halolake-control.db"
#
# new-api compatible environment variables are recognized:
#   SQLITE_PATH=/path/to/one-api.db
#   SQL_DSN=user:password@tcp(127.0.0.1:3306)/oneapi?parseTime=true
#   SQL_DSN=postgres://user:password@127.0.0.1:5432/oneapi
#   LOG_SQL_DSN=clickhouse://default:password@127.0.0.1:9000/logs
# MySQL/PostgreSQL/ClickHouse are recognized but not implemented yet; only
# memory and SQLite are usable in the current Rust control-api.

[[users]]
id = 1
username = "root"
password = "halolake-root-dev"
display_name = "Root"
role = 100
status = 1
group = "default"
quota = 100000000

[[tokens]]
id = "dev-token"
token = "dev-token"
user_id = "dev-user"
enabled = true
allowed_models = ["deepseek-v4-pro"]

[[channels]]
id = "openai-main"
provider = "open_ai"
base_url = "https://ioll.pp.ua"
api_key_env = "OPENAI_API_KEY"
enabled = true
weight = 1
models = ["deepseek-v4-pro"]

[[model_mappings]]
requested_model = "deepseek-v4-pro"
channel_id = "openai-main"
upstream_model = "deepseek-v4-pro"
