version = 1

[server]
listen = "0.0.0.0:8081"
request_body_limit_bytes = 16777216

[protocol]
claude_version = "2023-06-01"
pass_anthropic_beta = true
gemini_api_version = "v1beta"

[upstream]
connect_timeout_ms = 10000
read_timeout_ms = 300000

[auth]
accept_bearer = true
accept_x_api_key = true

# Uncomment to load the initial gateway snapshot from control-api instead of
# the local tokens/channels/model_mappings below.
# [control]
# snapshot_url = "http://127.0.0.1:9090/internal/gateway/snapshot"
# usage_url = "http://127.0.0.1:9090/internal/gateway/usage"
# channel_feedback_url = "http://127.0.0.1:9090/internal/gateway/channel-feedback"
# internal_key = "dev-internal-secret"
# connect_timeout_ms = 10000
# read_timeout_ms = 30000
# snapshot_poll_interval_ms = 5000

[[tokens]]
id = "dev-token"
token = "dev-token"
user_id = "dev-user"
enabled = true
allowed_models = [
  "claude-opus-4-8",
  "deepseek-v4-pro",
  "north-mini-code-free",
  # "gpt-image-1",
  # "imagen-4"
]

# [[channels]]
# id = "anthropic-main"
# provider = "claude"
# base_url = "https://tokilake.abrdns.com/"
# api_key_env = "ANTHROPIC_API_KEY"
# enabled = true
# weight = 1
# models = ["claude-opus-4-8"]

[[channels]]
id = "anthropic-main"
provider = "claude"
base_url = "https://mu.n8ncc.top"
api_key_env = "ANTHROPIC_API_KEY"
enabled = true
weight = 1
models = ["claude-opus-4-8","deepseek-v4-pro"]

[[channels]]
id = "openai-main"
provider = "open_ai"
base_url = "https://ioll.pp.ua"
api_key_env = "OPENAI_API_KEY"
enabled = true
weight = 1
models = ["deepseek-v4-pro", "north-mini-code-free"]

