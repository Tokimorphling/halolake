# Halolake one-shot — join existing Sub2API network + reuse its Postgres
#
# Prerequisites (on the server):
#   1. Create an empty DB (do NOT reuse sub2api's database):
#        docker exec -it sub2api-postgres psql -U <user> -c 'CREATE DATABASE halolake;'
#   2. Set credentials to match sub2api's Postgres (.env / compose):
#        export POSTGRES_USER=...
#        export POSTGRES_PASSWORD=...
#        # optional overrides:
#        # export POSTGRES_HOST=sub2api-postgres
#        # export POSTGRES_DB=halolake
#
#   mkdir -p ~/halolake && cd ~/halolake
#   curl -fsSL -o docker-compose.yml \
#     https://raw.githubusercontent.com/Tokimorphling/halolake/main/docker-compose.pull.sub2api.yml
#   # edit or export POSTGRES_* then:
#   docker compose up -d
#   cat data/halolake-credentials.txt
#
# Caddy (already on host):
#   halo.tokilake.abrdns.com    → 127.0.0.1:9090
#   haloapi.tokilake.abrdns.com → 127.0.0.1:8082
#
# Image: linux/arm64

services:
  halolake:
    image: ${HALOLAKE_IMAGE:-ghcr.io/tokimorphling/halolake:main}
    container_name: halolake
    ports:
      # Only localhost — Caddy terminates TLS
      - "127.0.0.1:9090:9090"
      - "127.0.0.1:8082:8082"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      HALOLAKE_CREDENTIALS_FILE: /data/halolake-credentials.txt
      HALOLAKE_CONTROL_CONFIG: /app/config/control-api.toml
      HALOLAKE_GATEWAY_CONFIG: /app/config/gateway.toml
      # Prefer SQL_DSN (wins over docker default sqlite when set)
      SQL_DSN: postgres://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@${POSTGRES_HOST:-sub2api-postgres}:5432/${POSTGRES_DB:-halolake}
      # Optional OTEL (Grafana Cloud OTLP: protocol=http/protobuf + Authorization header)
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-halolake}
    volumes:
      - ./data:/data
    networks:
      - sub2api_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9090/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  sub2api_net:
    external: true
    name: sub2api_sub2api-network
