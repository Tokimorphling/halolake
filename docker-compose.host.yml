# One-shot host-network deploy (Linux recommended; Docker Desktop macOS host mode is limited).
#
#   docker compose -f docker-compose.host.yml up --build
#
# control-api :9090  |  gateway :8082
# data: ./data (sqlite)

services:
  halolake:
    build: .
    image: halolake:local
    container_name: halolake
    network_mode: host
    environment:
      RUST_LOG: info
      # Optional OTLP (logs/traces/metrics). Unset = stderr only.
      # OTEL_EXPORTER_OTLP_ENDPOINT: http://127.0.0.1:4317
      # OTEL_SERVICE_NAME: halolake
      # OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      # Unset SESSION_SECRET → first boot writes secrets + admin password to:
      #   ./data/halolake-credentials.txt  (cat that file after start)
      HALOLAKE_CREDENTIALS_FILE: /data/halolake-credentials.txt
      HALOLAKE_CONTROL_CONFIG: /app/config/control-api.toml
      HALOLAKE_GATEWAY_CONFIG: /app/config/gateway.toml
    volumes:
      - ./data:/data
      - ./examples/docker:/app/config:ro
    restart: unless-stopped
