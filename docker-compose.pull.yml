# Halolake one-shot (no git clone required) — image is linux/arm64
#
#   mkdir -p halolake && cd halolake
#   curl -fsSL -o docker-compose.yml \
#     https://raw.githubusercontent.com/Tokimorphling/halolake/main/docker-compose.pull.yml
#   docker compose up -d
#   cat data/halolake-credentials.txt   # first-boot admin user/password
#
# UI http://localhost:9090  |  Gateway http://localhost:8082
#
# Private GHCR package:
#   echo $GHCR_TOKEN | docker login ghcr.io -u YOUR_GITHUB_USER --password-stdin
#   # or: export HALOLAKE_IMAGE=ghcr.io/tokimorphling/halolake:main

services:
  halolake:
    image: ${HALOLAKE_IMAGE:-ghcr.io/tokimorphling/halolake:main}
    container_name: halolake
    ports:
      - "9090:9090"
      - "8082:8082"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      # Leave SESSION_SECRET unset → auto secrets + admin in /data/halolake-credentials.txt
      HALOLAKE_CREDENTIALS_FILE: /data/halolake-credentials.txt
      HALOLAKE_CONTROL_CONFIG: /app/config/control-api.toml
      HALOLAKE_GATEWAY_CONFIG: /app/config/gateway.toml
      # Optional OTEL:
      # OTEL_EXPORTER_OTLP_ENDPOINT: http://host.docker.internal:4317
      # OTEL_SERVICE_NAME: halolake
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9090/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
