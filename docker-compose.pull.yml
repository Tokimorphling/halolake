# One-shot deploy with prebuilt image (set OWNER/REPO after first GHCR publish).
#
#   export HALOLAKE_IMAGE=ghcr.io/<owner>/halolake:latest
#   docker compose -f docker-compose.pull.yml up -d
#
# First boot: open http://localhost:9090  (setup / login root)
# Gateway:    http://localhost:8082
#
# Default root (examples/docker): username root / password halolake-root-dev
# Change SESSION_SECRET and root password immediately for real use.

services:
  halolake:
    image: ${HALOLAKE_IMAGE:-ghcr.io/halolake/halolake:latest}
    container_name: halolake
    ports:
      - "9090:9090"
      - "8082:8082"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      # Leave SESSION_SECRET unset to auto-generate into /data/halolake-credentials.txt
      # SESSION_SECRET: ${SESSION_SECRET:-}
      HALOLAKE_CREDENTIALS_FILE: /data/halolake-credentials.txt
      # Optional OpenTelemetry:
      # OTEL_EXPORTER_OTLP_ENDPOINT: http://host.docker.internal:4317
      # OTEL_SERVICE_NAME: halolake
      HALOLAKE_CONTROL_CONFIG: /app/config/control-api.toml
      HALOLAKE_GATEWAY_CONFIG: /app/config/gateway.toml
    volumes:
      - ./data:/data
      # Override configs without rebuilding:
      # - ./my-control.toml:/app/config/control-api.toml:ro
      # - ./my-gateway.toml:/app/config/gateway.toml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9090/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
